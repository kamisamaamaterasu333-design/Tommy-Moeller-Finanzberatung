<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Tommy Möller</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">TM<span>.</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Start</a></li>
        <li><a href="about.html">Über mich</a></li>
        <li><a href="services.html">Dienstleistungen</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Kontakt</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box animate-in">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-family:var(--font-serif);font-size:32px;color:var(--gold);margin-bottom:4px">TM<span style="color:var(--bright)">.</span></div>
      </div>

      <h1 class="auth-title">Anmelden</h1>
      <p class="auth-sub">Zugang für registrierte Nutzer und Administratoren</p>

      <!-- Fehlermeldung -->
      <div id="login-error" style="background:rgba(239,68,68,0.1);border:1px solid var(--red);border-radius:var(--r);padding:12px 16px;color:#fca5a5;font-size:14px;margin-bottom:16px;display:none"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Benutzername</label>
          <input
            type="text" class="form-input" id="username"
            placeholder="Dein Benutzername"
            autocomplete="username"
            maxlength="40"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Passwort</label>
          <input
            type="password" class="form-input" id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            maxlength="100"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px" id="login-btn">
          Anmelden
        </button>
      </form>

      <!-- Demo-Hinweis (in Produktion entfernen!) -->
      <div style="margin-top:24px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:var(--r);padding:14px">
        <div style="font-size:11px;color:var(--gold);font-family:var(--font-mono);letter-spacing:1px;margin-bottom:8px">DEMO-ZUGANGSDATEN</div>
        <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-dim);line-height:2">
        <strong style="color:var(--bright)">User:</strong>  User_NameX / User4ever.
        </div>
      </div>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
        <a href="../index.html" style="color:var(--gold);text-decoration:none">← Zurück zur Website</a>
      </p>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    // Weiterleitungsziel aus URL-Parameter lesen
    const urlParams   = new URLSearchParams(window.location.search);
    const redirectTo  = urlParams.get('redirect') || '../index.html';

    // Wenn bereits eingeloggt: weiterleiten
    if (Auth.isLoggedIn()) window.location.href = redirectTo;

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      // Basic-Validation
      if (!username || !password) {
        errEl.textContent = 'Bitte Benutzername und Passwort eingeben.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true;
      btn.textContent = 'Wird geprüft…';

      // Kleines Delay simuliert Server-Request (verhindert auch Timing-Attacks)
      setTimeout(() => {
        const result = Auth.login(username, password);
        if (result.success) {
          showToast('Willkommen zurück, ' + result.user.username + '!', 'success');
          setTimeout(() => window.location.href = redirectTo, 800);
        } else {
          errEl.textContent = result.error;
          errEl.style.display = 'block';
          document.getElementById('password').value = '';
          btn.disabled = false;
          btn.textContent = 'Anmelden';
        }
      }, 600);
    });
  </script>
</body>
</html>
