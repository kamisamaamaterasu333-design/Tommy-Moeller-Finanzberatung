<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Tommy Möller</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">TM<span>.</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Start</a></li>
        <li><a href="about.html">Über mich</a></li>
        <li><a href="services.html">Dienstleistungen</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Kontakt</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menü"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box animate-in">

      <div style="text-align:center;margin-bottom:28px">
        <div style="font-family:var(--font-serif);font-size:32px;color:var(--gold);margin-bottom:4px">TM<span style="color:var(--bright)">.</span></div>
      </div>

      <h1 class="auth-title">Anmelden</h1>
      <p class="auth-sub">Zugang für registrierte Nutzer und Administratoren</p>

      <!-- Fehlermeldung -->
      <div id="login-error" style="background:rgba(239,68,68,0.1);border:1px solid var(--red);border-radius:var(--r);padding:12px 16px;color:#fca5a5;font-size:14px;margin-bottom:16px;display:none"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <!-- Supabase Auth benötigt eine E-Mail-Adresse statt einem Benutzernamen -->
          <label class="form-label" for="login-email">E-Mail</label>
          <input
            type="email" class="form-input" id="login-email"
            placeholder="deine@email.de"
            autocomplete="email"
            maxlength="100"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Passwort</label>
          <input
            type="password" class="form-input" id="login-password"
            placeholder="••••••••"
            autocomplete="current-password"
            maxlength="100"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px" id="login-btn">
          Anmelden
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
        <a href="../index.html" style="color:var(--gold);text-decoration:none">← Zurück zur Website</a>
      </p>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(
      'https://kalonkzgzbpsndkuznqp.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthbG9ua3pnemJwc25ka3V6bnFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NjkxMjQsImV4cCI6MjA5MTA0NTEyNH0.FChiR30MGNLUv3L2hSi-d-hNTg8pVLoMNN5XgWrX1ZQ'
    );

    // Weiterleitungsziel aus URL-Parameter lesen (Rückwärtskompatibilität)
    const urlParams  = new URLSearchParams(window.location.search);
    const redirectTo = urlParams.get('redirect') || 'blog.html';

    // Falls bereits eingeloggt → sofort weiterleiten
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = redirectTo;
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      // Grundlegende Validierung
      if (!email || !password) {
        errEl.textContent   = 'Bitte E-Mail und Passwort eingeben.';
        errEl.style.display = 'block';
        return;
      }

      // Button deaktivieren, damit kein Doppelklick möglich ist
      btn.disabled    = true;
      btn.textContent = 'Wird geprüft…';
      errEl.style.display = 'none';

      // Supabase v2: signInWithPassword (nicht mehr das veraltete signIn)
      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        // Benutzerfreundliche Fehlermeldung statt technischer Fehlercodes
        errEl.textContent = (
          error.message.includes('Invalid login credentials')
            ? 'E-Mail oder Passwort falsch. Bitte erneut versuchen.'
            : 'Fehler beim Anmelden. Bitte versuche es erneut.'
        );
        errEl.style.display = 'block';
        document.getElementById('login-password').value = '';
        btn.disabled    = false;
        btn.textContent = 'Anmelden';
      } else {
        // Erfolgreich eingeloggt
        showToast('Willkommen zurück!', 'success');
        setTimeout(() => window.location.href = redirectTo, 800);
      }
    });
  </script>
</body>
</html>
