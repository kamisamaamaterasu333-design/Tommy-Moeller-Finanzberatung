<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Immobilie kaufen</title>
<style>
  :root {
    --accent: #2563eb;
    --accent-dim: #1d4ed8;
    --bg-dark: #0D0D0D;
    --bg-card: #1E1E1E;
    --border: #2E2E2E;
    --text-primary: #F0F0F0;
    --text-secondary: #A0A0A0;
    --text-muted: #666;
    --green: #16a34a;
    --red: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-dark); color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh; padding: 40px 20px;
  }
  .wrap { max-width: 700px; margin: 0 auto; }

  .quiz-header { text-align: center; margin-bottom: 32px; }
  .quiz-icon { font-size: 40px; margin-bottom: 12px; }
  .quiz-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .quiz-header h1 span { color: var(--accent); }
  .quiz-header p { color: var(--text-secondary); font-size: 14px; }

  .progress-track {
    height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-bottom: 28px;
  }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s ease; }

  .progress-text {
    text-align: center; font-size: 12px; color: var(--text-muted);
    font-family: 'Cascadia Code', monospace; margin-bottom: 24px;
  }

  .q-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px; display: none;
  }
  .q-card.active { display: block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-num {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
  }
  .q-text { font-size: 17px; font-weight: 600; margin-bottom: 22px; line-height: 1.5; }

  .option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    margin-bottom: 10px; cursor: pointer; transition: all .15s ease; font-size: 14px;
  }
  .option:hover { border-color: var(--accent); background: rgba(37,99,235,.06); }
  .option.selected { border-color: var(--accent); background: rgba(37,99,235,.1); }
  .option.correct { border-color: var(--green); background: rgba(22,163,74,.12); }
  .option.incorrect { border-color: var(--red); background: rgba(220,38,38,.12); }
  .option-letter {
    width: 26px; height: 26px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .option.correct .option-letter { background: var(--green); color: #fff; }
  .option.incorrect .option-letter { background: var(--red); color: #fff; }

  .feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 8px; font-size: 13.5px;
    display: none; line-height: 1.6;
  }
  .feedback.show { display: block; animation: fadeIn .3s ease; }
  .feedback.correct-fb { background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.3); color: #86efac; }
  .feedback.incorrect-fb { background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.3); color: #fca5a5; }

  .nav-row { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  .btn {
    padding: 11px 24px; border-radius: 7px; border: none; font-size: 13.5px; font-weight: 700;
    cursor: pointer; transition: opacity .2s ease;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:disabled { opacity: .35; cursor: default; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* RESULT SCREEN */
  .result-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 40px 32px; text-align: center; display: none;
  }
  .result-card.show { display: block; animation: fadeIn .4s ease; }
  .result-emoji { font-size: 52px; margin-bottom: 14px; }
  .result-score { font-size: 38px; font-weight: 800; margin-bottom: 6px; }
  .result-score span { color: var(--accent); }
  .result-label { font-size: 15px; color: var(--text-secondary); margin-bottom: 28px; }
  .result-bar-track { height: 10px; background: #1a1a1a; border-radius: 5px; overflow: hidden; margin-bottom: 28px; }
  .result-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); transition: width 1s ease; }
  .restart-btn {
    background: var(--accent); color: #fff; border: none; padding: 13px 30px;
    border-radius: 7px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .restart-btn:hover { opacity: .88; }
</style>
</head>
<body>
<div class="wrap">

  <div class="quiz-header">
    <div class="quiz-icon">🏠</div>
    <h1>Quiz: <span>Immobilie kaufen</span></h1>
    <p>10 Fragen zu Eigennutzung & Vermietung – teste dein Wissen aus der Schulung.</p>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">Frage 1 von 10</div>

  <div id="quizContainer"></div>

  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-score" id="resultScore">0 / 10</div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-bar-track"><div class="result-bar-fill" id="resultBarFill" style="width:0%"></div></div>
    <button class="restart-btn" onclick="restartQuiz()">↺ Quiz wiederholen</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Was ist bei den Kaufnebenkosten einer Immobilie typischerweise NICHT enthalten?",
    options: ["Grunderwerbsteuer", "Notarkosten", "Möbelkauf für die neue Wohnung", "Grundbucheintrag"],
    correct: 2,
    feedback: "Möbel sind keine Kaufnebenkosten im klassischen Sinn. Zu den Kaufnebenkosten zählen Grunderwerbsteuer, Notarkosten, Grundbucheintrag und ggf. Maklerprovision – zusammen meist 9–15% des Kaufpreises."
  },
  {
    q: "Welche Aussage zum Tilgungssatz stimmt?",
    options: [
      "Ein höherer Tilgungssatz verlängert die Kreditlaufzeit",
      "Ein höherer Tilgungssatz verkürzt die Kreditlaufzeit, erhöht aber die monatliche Rate",
      "Der Tilgungssatz hat keinen Einfluss auf die Laufzeit",
      "Der Tilgungssatz wird nach der Zinsbindung automatisch auf 0% gesetzt"
    ],
    correct: 1,
    feedback: "Eine höhere Tilgung bedeutet, dass du schneller schuldenfrei bist – allerdings bei höherer monatlicher Belastung. Klassische Tilgungssätze liegen bei 2-3% p.a."
  },
  {
    q: "Was beschreibt die Zinsbindung am besten?",
    options: [
      "Den Zeitraum, in dem der vereinbarte Zinssatz unverändert bleibt",
      "Die Gesamtlaufzeit des Kredits bis zur vollständigen Tilgung",
      "Die Höhe der monatlichen Rate",
      "Den Anteil des Eigenkapitals am Kaufpreis"
    ],
    correct: 0,
    feedback: "Die Zinsbindung legt fest, wie lange der vereinbarte Zinssatz gilt (z.B. 10, 15 oder 20 Jahre). Danach folgt meist eine Anschlussfinanzierung zum dann aktuellen Marktzins."
  },
  {
    q: "Was ist laut Kursinhalt eine grobe Faustregel zur Instandhaltungsrücklage?",
    options: [
      "0,1% des Immobilienwerts pro Jahr",
      "1–1,5% des Immobilienwerts pro Jahr",
      "10% des Immobilienwerts pro Jahr",
      "Eine Rücklage ist gesetzlich nicht notwendig"
    ],
    correct: 1,
    feedback: "Als Faustregel werden häufig 1–1,5% des Immobilienwerts pro Jahr als Instandhaltungsrücklage genannt, um spätere größere Reparaturen finanziell abzufedern."
  },
  {
    q: "Was unterscheidet die Bruttomietrendite von der Nettomietrendite?",
    options: [
      "Es gibt keinen Unterschied, beide Begriffe meinen dasselbe",
      "Die Nettomietrendite berücksichtigt zusätzlich Bewirtschaftungskosten und Kaufnebenkosten",
      "Die Bruttomietrendite wird nur bei Eigennutzung berechnet",
      "Die Nettomietrendite ist immer höher als die Bruttomietrendite"
    ],
    correct: 1,
    feedback: "Die Bruttomietrendite ist ein erster grober Anhaltspunkt (Jahreskaltmiete ÷ Kaufpreis), während die Nettomietrendite zusätzlich Bewirtschaftungskosten und Kaufnebenkosten berücksichtigt und damit realistischer ist."
  },
  {
    q: "Welcher Vorteil gilt laut Kurs typischerweise für die Eigennutzung gegenüber der Vermietung?",
    options: [
      "Steuerliche Abschreibung (AfA) ist bei Eigennutzung besonders hoch",
      "Mietfreies Wohnen nach vollständiger Tilgung",
      "Schuldzinsen sind bei Eigennutzung steuerlich absetzbar",
      "Es gibt keine Instandhaltungspflicht bei Eigennutzung"
    ],
    correct: 1,
    feedback: "Ein zentraler Vorteil der Eigennutzung ist das mietfreie Wohnen, sobald die Finanzierung getilgt ist. AfA und absetzbare Schuldzinsen gelten dagegen typischerweise für vermietete Objekte, nicht für Eigennutzung."
  },
  {
    q: "Was beschreibt die AfA (Absetzung für Abnutzung) im Kontext vermieteter Immobilien?",
    options: [
      "Eine einmalige Steuerbefreiung beim Kauf",
      "Die steuerliche Abschreibung des Gebäudewerts über die Nutzungsdauer",
      "Eine staatliche Förderung beim Erstkauf",
      "Die Versicherungssumme der Wohngebäudeversicherung"
    ],
    correct: 1,
    feedback: "Die AfA erlaubt es, den Gebäudewert (nicht den Grundstücksanteil) über die Nutzungsdauer steuerlich abzuschreiben – ein Vorteil, der bei vermieteten, nicht aber bei selbstgenutzten Immobilien greift."
  },
  {
    q: "Was bezeichnet die Spekulationsfrist im Immobilienkontext?",
    options: [
      "Die Zeit, die eine Bank für die Kreditzusage benötigt",
      "Den Zeitraum, nach dessen Ablauf ein Verkaufsgewinn meist steuerfrei ist",
      "Die Dauer der Zinsbindung",
      "Die Wartezeit bis zum Einzug nach dem Notartermin"
    ],
    correct: 1,
    feedback: "Wird eine Immobilie innerhalb von 10 Jahren nach dem Kauf wieder verkauft, kann der Veräußerungsgewinn steuerpflichtig sein – nach Ablauf dieser Frist ist ein Gewinn meist steuerfrei (mit Ausnahmen bei Eigennutzung)."
  },
  {
    q: "Welche Aussage zum Vergleich Kaufen vs. Mieten ist laut Kurs am treffendsten?",
    options: [
      "Kaufen ist in jeder Lebenssituation grundsätzlich besser als Mieten",
      "Mieten ist immer die wirtschaftlich klügere Wahl",
      "Es kommt auf Faktoren wie geplante Wohndauer, Eigenkapital und Flexibilitätsbedarf an",
      "Die Entscheidung hängt ausschließlich vom aktuellen Zinsniveau ab"
    ],
    correct: 2,
    feedback: "Der Kurs betont ausdrücklich, dass es keine pauschale Antwort gibt – die individuelle Situation (Wohndauer, Eigenkapital, Flexibilität) entscheidet, ob Kaufen oder Mieten sinnvoller ist."
  },
  {
    q: "Was sollte laut Checkliste VOR dem Notartermin unbedingt vorliegen bzw. geprüft sein?",
    options: [
      "Nur die mündliche Zusage des Verkäufers",
      "Eine finale Finanzierungszusage und Einsicht in den Grundbuchauszug",
      "Ein bereits unterschriebener Mietvertrag für das Objekt",
      "Die Zustimmung aller Nachbarn"
    ],
    correct: 1,
    feedback: "Vor dem Notartermin sollten die Finanzierungszusage final vorliegen und der Grundbuchauszug auf Belastungen und Rechte geprüft sein – außerdem der Kaufvertragsentwurf rechtzeitig vorab eingesehen werden."
  }
];

let current = 0;
let score = 0;
let answered = [];

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = questions.map((item, i) => `
    <div class="q-card" id="q-${i}" data-index="${i}">
      <div class="q-num">Frage ${i+1} von ${questions.length}</div>
      <div class="q-text">${item.q}</div>
      <div class="options" id="options-${i}">
        ${item.options.map((opt, j) => `
          <div class="option" data-q="${i}" data-opt="${j}" onclick="selectOption(${i}, ${j})">
            <div class="option-letter">${String.fromCharCode(65 + j)}</div>
            <div>${opt}</div>
          </div>
        `).join('')}
      </div>
      <div class="feedback" id="feedback-${i}"></div>
      <div class="nav-row">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${i === 0 ? 'style="visibility:hidden"' : ''}>← Zurück</button>
        <button class="btn btn-primary" id="next-${i}" onclick="nextQuestion()" disabled>
          ${i === questions.length - 1 ? 'Quiz auswerten' : 'Weiter →'}
        </button>
      </div>
    </div>
  `).join('');
  showQuestion(0);
}

function showQuestion(i) {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
  document.getElementById('q-' + i).classList.add('active');
  current = i;
  updateProgress();
}

function updateProgress() {
  const pct = ((current) / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Frage ${current + 1} von ${questions.length}`;
}

function selectOption(qIndex, optIndex) {
  if (answered[qIndex] !== undefined) return; // bereits beantwortet

  const item = questions[qIndex];
  const isCorrect = optIndex === item.correct;
  answered[qIndex] = optIndex;
  if (isCorrect) score++;

  const optionEls = document.querySelectorAll(`#options-${qIndex} .option`);
  optionEls.forEach((el, j) => {
    el.style.pointerEvents = 'none';
    if (j === item.correct) el.classList.add('correct');
    else if (j === optIndex && !isCorrect) el.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-' + qIndex);
  fb.textContent = (isCorrect ? '✓ Richtig! ' : '✗ Nicht ganz. ') + item.feedback;
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'incorrect-fb');

  document.getElementById('next-' + qIndex).disabled = false;
}

function nextQuestion() {
  if (current < questions.length - 1) {
    showQuestion(current + 1);
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (current > 0) showQuestion(current - 1);
}

function showResult() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = 'Quiz abgeschlossen';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('resultScore').innerHTML = `${score} / ${questions.length}`;
  document.getElementById('resultBarFill').style.width = pct + '%';

  let emoji, label;
  if (pct === 100) { emoji = '🏆'; label = 'Perfekt! Du hast alle Fragen richtig beantwortet.'; }
  else if (pct >= 80) { emoji = '🎉'; label = 'Sehr gut! Du hast die wichtigsten Inhalte verinnerlicht.'; }
  else if (pct >= 50) { emoji = '👍'; label = 'Solide Basis – ein erneuter Blick in die Schulung lohnt sich.'; }
  else { emoji = '📚'; label = 'Schau dir die Schulungsunterlagen nochmal in Ruhe an.'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultLabel').textContent = label;
  document.getElementById('resultCard').classList.add('show');
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = [];
  document.getElementById('resultCard').classList.remove('show');
  buildQuiz();
}

buildQuiz();
</script>
</body>
</html>
