<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Anlageklassen im Vergleich</title>
<style>
  :root {
    --accent: #059669;
    --accent-dim: #047857;
    --bg-dark: #0D0D0D;
    --bg-card: #1E1E1E;
    --border: #2E2E2E;
    --text-primary: #F0F0F0;
    --text-secondary: #A0A0A0;
    --text-muted: #666;
    --green: #16a34a;
    --red: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-dark); color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh; padding: 40px 20px;
  }
  .wrap { max-width: 700px; margin: 0 auto; }

  .quiz-header { text-align: center; margin-bottom: 32px; }
  .quiz-icon { font-size: 40px; margin-bottom: 12px; }
  .quiz-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .quiz-header h1 span { color: var(--accent); }
  .quiz-header p { color: var(--text-secondary); font-size: 14px; }

  .progress-track { height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s ease; }
  .progress-text { text-align: center; font-size: 12px; color: var(--text-muted); font-family: 'Cascadia Code', monospace; margin-bottom: 24px; }

  .q-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; display: none; }
  .q-card.active { display: block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-num { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .q-text { font-size: 17px; font-weight: 600; margin-bottom: 22px; line-height: 1.5; }

  .option {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--border);
    border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all .15s ease; font-size: 14px;
  }
  .option:hover { border-color: var(--accent); background: rgba(5,150,105,.08); }
  .option.selected { border-color: var(--accent); background: rgba(5,150,105,.12); }
  .option.correct { border-color: var(--green); background: rgba(22,163,74,.12); }
  .option.incorrect { border-color: var(--red); background: rgba(220,38,38,.12); }
  .option-letter {
    width: 26px; height: 26px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .option.correct .option-letter { background: var(--green); color: #fff; }
  .option.incorrect .option-letter { background: var(--red); color: #fff; }

  .feedback { margin-top: 16px; padding: 14px 16px; border-radius: 8px; font-size: 13.5px; display: none; line-height: 1.6; }
  .feedback.show { display: block; animation: fadeIn .3s ease; }
  .feedback.correct-fb { background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.3); color: #86efac; }
  .feedback.incorrect-fb { background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.3); color: #fca5a5; }

  .nav-row { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  .btn { padding: 11px 24px; border-radius: 7px; border: none; font-size: 13.5px; font-weight: 700; cursor: pointer; transition: opacity .2s ease; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:disabled { opacity: .35; cursor: default; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-secondary:hover { border-color: var(--accent); color: #4ade80; }

  .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 40px 32px; text-align: center; display: none; }
  .result-card.show { display: block; animation: fadeIn .4s ease; }
  .result-emoji { font-size: 52px; margin-bottom: 14px; }
  .result-score { font-size: 38px; font-weight: 800; margin-bottom: 6px; }
  .result-score span { color: var(--accent); }
  .result-label { font-size: 15px; color: var(--text-secondary); margin-bottom: 28px; }
  .result-bar-track { height: 10px; background: #1a1a1a; border-radius: 5px; overflow: hidden; margin-bottom: 28px; }
  .result-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #4ade80); transition: width 1s ease; }
  .restart-btn { background: var(--accent); color: #fff; border: none; padding: 13px 30px; border-radius: 7px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .restart-btn:hover { opacity: .88; }
</style>
</head>
<body>
<div class="wrap">

  <div class="quiz-header">
    <div class="quiz-icon">📈</div>
    <h1>Quiz: <span>Anlageklassen im Vergleich</span></h1>
    <p>10 Fragen zu ETFs, Fonds, Aktien, Anleihen, Rohstoffen & Kryptowährungen.</p>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">Frage 1 von 10</div>

  <div id="quizContainer"></div>

  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-score" id="resultScore">0 / 10</div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-bar-track"><div class="result-bar-fill" id="resultBarFill" style="width:0%"></div></div>
    <button class="restart-btn" onclick="restartQuiz()">↺ Quiz wiederholen</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Was ist der zentrale Unterschied zwischen einem ETF und einem aktiv gemanagten Fonds?",
    options: [
      "ETFs sind grundsätzlich riskanter als aktive Fonds",
      "Ein ETF bildet einen Index passiv nach, ein aktiver Fonds trifft gezielte Einzelentscheidungen eines Fondsmanagers",
      "Aktive Fonds haben grundsätzlich niedrigere Kosten als ETFs",
      "ETFs können nicht an der Börse gehandelt werden"
    ],
    correct: 1,
    feedback: "ETFs bilden passiv einen Index nach (z.B. MSCI World), während bei aktiv gemanagten Fonds ein Fondsmanager gezielt Wertpapiere auswählt – mit entsprechend höheren laufenden Kosten."
  },
  {
    q: "Was beschreibt die TER (Total Expense Ratio)?",
    options: [
      "Die jährliche Gesamtrendite eines Fonds",
      "Die laufende jährliche Kostenquote eines Fonds/ETFs in Prozent des investierten Kapitals",
      "Den Anteil ausländischer Aktien in einem Index",
      "Die Mindesthaltedauer einer Anlage"
    ],
    correct: 1,
    feedback: "Die TER gibt an, wie hoch die laufenden jährlichen Kosten eines Fonds oder ETFs sind – ein entscheidender Faktor für die Rendite über lange Zeiträume."
  },
  {
    q: "Was ist laut Kurs ein zentraler Nachteil von Einzelaktien gegenüber breit gestreuten ETFs?",
    options: [
      "Einzelaktien können nicht verkauft werden",
      "Höheres Klumpenrisiko durch fehlende Streuung",
      "Einzelaktien zahlen grundsätzlich keine Dividenden",
      "Einzelaktien sind gesetzlich nur für institutionelle Anleger zugänglich"
    ],
    correct: 1,
    feedback: "Bei Einzelaktien besteht ein höheres Klumpenrisiko, da das Kapital auf ein einzelnes Unternehmen konzentriert ist – ein Totalverlust bei einem Unternehmen wirkt sich stärker aus als bei einem breit gestreuten ETF."
  },
  {
    q: "Welche Aussage zu Anleihen ist laut Kurs korrekt?",
    options: [
      "Anleihen bieten immer eine höhere Rendite als Aktien",
      "Anleihen sind grundsätzlich risikofrei",
      "Anleihen gelten häufig als defensiverer Portfoliobaustein mit planbaren Zinszahlungen",
      "Anleihen können nicht an Wert verlieren"
    ],
    correct: 2,
    feedback: "Anleihen gelten klassischerweise als defensiverer Baustein mit planbaren Zinszahlungen, sind aber nicht risikofrei – es bestehen Zinsänderungs- und Ausfallrisiken, abhängig von der Bonität des Schuldners."
  },
  {
    q: "Was beschreibt das Zinsänderungsrisiko bei Anleihen?",
    options: [
      "Das Risiko, dass der Schuldner die Zinsen nicht zahlen kann",
      "Das Risiko, dass der Kurs einer Anleihe fällt, wenn die Marktzinsen steigen",
      "Das Risiko eines Totalverlusts bei jeder Anleihe",
      "Das Risiko, dass eine Anleihe nicht handelbar ist"
    ],
    correct: 1,
    feedback: "Steigen die Marktzinsen, sinkt tendenziell der Kurs bestehender Anleihen mit niedrigerer Verzinsung, da neue Anleihen attraktivere Zinsen bieten – das ist das Zinsänderungsrisiko."
  },
  {
    q: "Welcher Rohstoff wird im Kurs historisch oft als 'Krisenwährung' bzw. zur Portfoliostabilisierung genannt?",
    options: ["Erdöl", "Gold", "Industriemetalle", "Agrarrohstoffe"],
    correct: 1,
    feedback: "Gold wird historisch häufig als Inflationsschutz und 'Krisenwährung' zur Beimischung im Portfolio genutzt – andere Rohstoffe wie Öl oder Industriemetalle sind stärker konjunkturabhängig."
  },
  {
    q: "Was ist laut Kurs eine zentrale Schwäche von Rohstoffinvestments im Vergleich zu Aktien oder Anleihen?",
    options: [
      "Rohstoffe können nur physisch gelagert werden",
      "Rohstoffe erzeugen keine laufenden Erträge wie Zinsen oder Dividenden",
      "Rohstoffe sind grundsätzlich verboten zu handeln",
      "Rohstoffe haben immer eine negative Rendite"
    ],
    correct: 1,
    feedback: "Anders als Aktien (Dividenden) oder Anleihen (Zinsen) erzeugen Rohstoffe keine laufenden Erträge – die Wertentwicklung hängt allein von der Preisentwicklung ab."
  },
  {
    q: "Welche Aussage zu Kryptowährungen ist laut Kurs zutreffend?",
    options: [
      "Kryptowährungen gelten als besonders risikoarme Anlageklasse",
      "Kryptowährungen gelten als hochspekulativ mit sehr hoher Schwankungsbreite",
      "Kryptowährungen werden seit Jahrzehnten gehandelt und gelten als sehr gut erforscht",
      "Ein Totalverlust ist bei Kryptowährungen praktisch ausgeschlossen"
    ],
    correct: 1,
    feedback: "Kryptowährungen werden im Kurs ausdrücklich als hochspekulative Anlageklasse mit sehr hoher Schwankungsbreite und vergleichsweise junger Marktgeschichte eingeordnet."
  },
  {
    q: "Was bedeutet Diversifikation im Kontext der Geldanlage?",
    options: [
      "Die Konzentration des gesamten Kapitals auf eine einzelne Aktie",
      "Die Streuung des Kapitals auf viele verschiedene Anlagen zur Risikoreduktion",
      "Der ausschließliche Kauf von Kryptowährungen",
      "Der tägliche Wechsel zwischen verschiedenen Anlagen"
    ],
    correct: 1,
    feedback: "Diversifikation bedeutet, das Kapital auf viele verschiedene Anlagen zu streuen, um das Risiko einzelner Ausfälle abzufedern – ein Grundprinzip seriöser Geldanlage."
  },
  {
    q: "Was betont der Kurs zum Thema 'Risikotragfähigkeit vs. Risikobereitschaft'?",
    options: [
      "Beide Begriffe bedeuten dasselbe und können gleichgesetzt werden",
      "Risikotragfähigkeit (finanziell leistbar) und Risikobereitschaft (emotional aushaltbar) sind zwei unterschiedliche Aspekte, die beide berücksichtigt werden sollten",
      "Nur die Risikobereitschaft ist für die Anlageentscheidung relevant",
      "Risikotragfähigkeit gilt nur für institutionelle Anleger"
    ],
    correct: 1,
    feedback: "Der Kurs unterscheidet bewusst zwischen dem, was man sich finanziell leisten kann zu verlieren (Tragfähigkeit), und dem, was man emotional aushält (Bereitschaft) – beide Aspekte sollten bei der Anlageentscheidung einfließen."
  }
];

let current = 0;
let score = 0;
let answered = [];

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = questions.map((item, i) => `
    <div class="q-card" id="q-${i}" data-index="${i}">
      <div class="q-num">Frage ${i+1} von ${questions.length}</div>
      <div class="q-text">${item.q}</div>
      <div class="options" id="options-${i}">
        ${item.options.map((opt, j) => `
          <div class="option" data-q="${i}" data-opt="${j}" onclick="selectOption(${i}, ${j})">
            <div class="option-letter">${String.fromCharCode(65 + j)}</div>
            <div>${opt}</div>
          </div>
        `).join('')}
      </div>
      <div class="feedback" id="feedback-${i}"></div>
      <div class="nav-row">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${i === 0 ? 'style="visibility:hidden"' : ''}>← Zurück</button>
        <button class="btn btn-primary" id="next-${i}" onclick="nextQuestion()" disabled>
          ${i === questions.length - 1 ? 'Quiz auswerten' : 'Weiter →'}
        </button>
      </div>
    </div>
  `).join('');
  showQuestion(0);
}

function showQuestion(i) {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
  document.getElementById('q-' + i).classList.add('active');
  current = i;
  updateProgress();
}

function updateProgress() {
  const pct = ((current) / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Frage ${current + 1} von ${questions.length}`;
}

function selectOption(qIndex, optIndex) {
  if (answered[qIndex] !== undefined) return;

  const item = questions[qIndex];
  const isCorrect = optIndex === item.correct;
  answered[qIndex] = optIndex;
  if (isCorrect) score++;

  const optionEls = document.querySelectorAll(`#options-${qIndex} .option`);
  optionEls.forEach((el, j) => {
    el.style.pointerEvents = 'none';
    if (j === item.correct) el.classList.add('correct');
    else if (j === optIndex && !isCorrect) el.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-' + qIndex);
  fb.textContent = (isCorrect ? '✓ Richtig! ' : '✗ Nicht ganz. ') + item.feedback;
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'incorrect-fb');

  document.getElementById('next-' + qIndex).disabled = false;
}

function nextQuestion() {
  if (current < questions.length - 1) {
    showQuestion(current + 1);
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (current > 0) showQuestion(current - 1);
}

function showResult() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = 'Quiz abgeschlossen';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('resultScore').innerHTML = `${score} / ${questions.length}`;
  document.getElementById('resultBarFill').style.width = pct + '%';

  let emoji, label;
  if (pct === 100) { emoji = '🏆'; label = 'Perfekt! Du hast alle Fragen richtig beantwortet.'; }
  else if (pct >= 80) { emoji = '🎉'; label = 'Sehr gut! Du hast die wichtigsten Inhalte verinnerlicht.'; }
  else if (pct >= 50) { emoji = '👍'; label = 'Solide Basis – ein erneuter Blick in die Schulung lohnt sich.'; }
  else { emoji = '📚'; label = 'Schau dir die Schulungsunterlagen nochmal in Ruhe an.'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultLabel').textContent = label;
  document.getElementById('resultCard').classList.add('show');
}

function restartQuiz() {
  current = 0;
  score = 0;
  answered = [];
  document.getElementById('resultCard').classList.remove('show');
  buildQuiz();
}

buildQuiz();
</script>
</body>
</html>
